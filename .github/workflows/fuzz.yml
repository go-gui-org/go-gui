name: Fuzz

on:
  schedule:
    - cron: '7 7 * * *'   # daily at 07:07 UTC
  workflow_dispatch:
    inputs:
      fuzztime:
        description: 'Seconds per fuzz target'
        required: false
        default: '60s'
        type: string

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          path: go-gui

      - uses: actions/checkout@v6
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Run fuzz tests
        working-directory: go-gui
        run: |
          FUZZTIME='${{ inputs.fuzztime || '60s' }}'
          PASS=0
          FAIL=0
          FLAKE=0

          {
            echo "## Fuzz results"
            echo "| Package | Target | Result |"
            echo "|---------|--------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          # A genuine failing input is always persisted by `go test` to
          # testdata/fuzz/<target>/. A nonzero exit WITHOUT a new reproducer
          # is the known fuzztime deadline flake (coordinator reports
          # "context deadline exceeded" when fuzztime expires mid-exec) and
          # must not fail the job. Gate failure on a written reproducer.
          fuzz_one() {
            local pkg="$1"
            local target="$2"
            local corpus="${pkg}/testdata/fuzz/${target}"
            echo "::group::fuzz ${pkg} ${target}"

            local before after
            before="$(find "${corpus}" -type f 2>/dev/null | sort)"

            local out status
            out="$(go test -fuzz="^${target}$" -fuzztime="${FUZZTIME}" -run='^$' "./${pkg}" 2>&1)"
            status=$?
            echo "${out}"
            echo "::endgroup::"

            after="$(find "${corpus}" -type f 2>/dev/null | sort)"

            if [ "$status" -eq 0 ]; then
              echo "| ${pkg} | ${target} | ✅ pass |" >> "$GITHUB_STEP_SUMMARY"
              PASS=$((PASS + 1))
            elif [ "${before}" != "${after}" ]; then
              # New reproducer written → genuine failing input.
              echo "::error::${pkg} ${target} found failing input"
              echo "| ${pkg} | ${target} | ❌ fail |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=$((FAIL + 1))
            else
              # Nonzero exit, no reproducer → deadline flake; do not fail.
              echo "::warning::${pkg} ${target} exited nonzero without a reproducer (deadline flake); ignoring"
              echo "| ${pkg} | ${target} | ⚠️ flake (ignored) |" >> "$GITHUB_STEP_SUMMARY"
              FLAKE=$((FLAKE + 1))
            fi
          }

          fuzz_one gui FuzzBezierClamp
          fuzz_one gui FuzzClampUnit
          fuzz_one gui FuzzLayoutPipelineDimensions
          fuzz_one gui FuzzListCoreFuzzyScore
          # Event & layout fuzzing (Testing Strategy Expansion)
          fuzz_one gui FuzzEventDispatch
          fuzz_one gui FuzzEventDispatchWithDialog
          fuzz_one gui FuzzEventDispatchUnfocused
          fuzz_one gui FuzzLayoutSizing
          fuzz_one gui FuzzLayoutSizingMinMax
          fuzz_one gui FuzzLayoutSizingWithMix
          fuzz_one gui/markdown FuzzMarkdownParse
          fuzz_one gui/markdown FuzzIsSafeURL
          fuzz_one gui/markdown FuzzHeadingSlug
          fuzz_one gui/svg FuzzNonNegF32
          fuzz_one gui/svg FuzzOverrideScalar
          fuzz_one gui/svg FuzzParseSvg
          fuzz_one gui/svg FuzzParseSvgDimensions
          fuzz_one gui/svg FuzzDecomposeTRS

          {
            echo ""
            echo "**${PASS} passed, ${FAIL} failed, ${FLAKE} flaked** (fuzztime=${FUZZTIME})"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::${FAIL} fuzz target(s) found failing inputs"
            exit 1
          fi

      - name: Upload fuzz corpus
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-corpus
          path: go-gui/**/testdata/fuzz/**/*
          retention-days: 7
          if-no-files-found: warn
