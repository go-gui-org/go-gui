name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libgl1-mesa-dev \
            libfreetype6-dev libharfbuzz-dev libpango1.0-dev \
            libfontconfig1-dev libglib2.0-dev \
            libx11-dev libxext-dev libxcursor-dev libxinerama-dev \
            libxi-dev libxrandr-dev libxfixes-dev libxkbcommon-dev \
            libwayland-dev libdbus-1-dev libpulse-dev libasound2-dev

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Build showcase
        working-directory: go-gui
        run: make build-linux

      - name: Verify static linking
        working-directory: go-gui
        run: |
          if ldd build/showcase-linux 2>&1 | grep -q libSDL2; then
            echo "FAIL: binary references dynamic SDL2"; exit 1
          fi
          echo "OK: no dynamic SDL2 references"

      - name: Package
        working-directory: go-gui
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          tar czf "go-gui-showcase-${VERSION}-linux-amd64.tar.gz" \
            -C build showcase-linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-asset
          path: go-gui/go-gui-showcase-*.tar.gz

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: brew install sdl2 sdl2_mixer sdl2_ttf sdl2_image

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Build showcase
        working-directory: go-gui
        run: make build-macos

      - name: Package
        working-directory: go-gui
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go run ./cmd/buildapp -version "${VERSION#v}" \
            -bundle-deps -name "Go-Gui Showcase" build/showcase-macos
          hdiutil create -srcfolder "Go-Gui Showcase.app" \
            -volname "Go-Gui Showcase ${VERSION}" \
            -format UDZO "Go-Gui-Showcase-${VERSION}.dmg"
          codesign -s - --force "Go-Gui-Showcase-${VERSION}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-asset
          path: go-gui/Go-Gui-Showcase-*.dmg

  windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-SDL2_image
            zip

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Build showcase
        working-directory: go-gui
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=gcc \
            go build -tags static,audio -ldflags \
              "-X github.com/go-gui-org/go-gui/gui.Version=${VERSION} \
               -X github.com/go-gui-org/go-gui/gui.Commit=$(git rev-parse --short HEAD)" \
            -o build/showcase-windows.exe ./examples/showcase/

      - name: Verify static linking
        working-directory: go-gui
        run: |
          if objdump -p build/showcase-windows.exe | grep -qi 'DLL Name: SDL2'; then
            echo "FAIL: binary references dynamic SDL2 DLLs"; exit 1
          fi
          echo "OK: no dynamic SDL2 references"

      - name: Package
        working-directory: go-gui
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          zip "go-gui-showcase-${VERSION}-windows-amd64.zip" \
            build/showcase-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-asset
          path: go-gui/go-gui-showcase-*.zip

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Build c-archive (device)
        working-directory: go-gui/examples/ios_demo
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CC=$(xcrun --sdk iphoneos --find clang)
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
            CC="$CC" \
            CGO_CFLAGS="-isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
            CGO_LDFLAGS="-isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
            go build -buildmode=c-archive -tags ios -o libgoguiapp-device.a .

      - name: Build c-archive (simulator)
        working-directory: go-gui/examples/ios_demo
        run: |
          SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          CC=$(xcrun --sdk iphonesimulator --find clang)
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
            CC="$CC" \
            CGO_CFLAGS="-isysroot $SDK -arch arm64 -mios-simulator-version-min=17.0" \
            CGO_LDFLAGS="-isysroot $SDK -arch arm64 -mios-simulator-version-min=17.0" \
            go build -buildmode=c-archive -tags ios -o ios/libgoguiapp.a .

      - name: Build simulator .app
        working-directory: go-gui/examples/ios_demo
        run: |
          xcodebuild -project ios/IOSDemo.xcodeproj \
            -scheme IOSDemo \
            -sdk iphonesimulator \
            -arch arm64 \
            -derivedDataPath build/xcode \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package
        working-directory: go-gui
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          mkdir -p build/ios-device build/ios-simulator
          # Device: static library for app developers
          cp examples/ios_demo/libgoguiapp-device.a build/ios-device/libgoguiapp.a
          cp gui/backend/ios/ios_app.h build/ios-device/
          # Simulator: runnable .app (no Developer account needed)
          cp -a examples/ios_demo/build/xcode/Build/Products/Debug-iphonesimulator/IOSDemo.app \
            build/ios-simulator/
          cp examples/ios_demo/ios/IOSDemo/README.md build/ios-simulator/
          cd build && zip "../go-gui-ios-${VERSION}.zip" \
            ios-device/libgoguiapp.a ios-device/ios_app.h \
            -r ios-simulator/IOSDemo.app ios-simulator/README.md

      - uses: actions/upload-artifact@v4
        with:
          name: ios-asset
          path: go-gui/go-gui-ios-*.zip

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Build Android native deps
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          ./go-glyph/scripts/build_android_deps.sh

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          gomobile init

      - name: Build AAR
        working-directory: go-gui/examples/android_demo
        run: |
          gomobile bind -target=android/arm64 -androidapi 24 \
            -o gogui.aar .

      - name: Package
        working-directory: go-gui
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          mkdir -p build/android
          cp examples/android_demo/gogui.aar build/android/
          cp examples/android_demo/gogui-sources.jar build/android/ 2>/dev/null || true
          cd build && zip "../go-gui-android-${VERSION}.zip" \
            android/gogui.aar android/gogui-sources.jar

      - uses: actions/upload-artifact@v4
        with:
          name: android-asset
          path: go-gui/go-gui-android-*.zip

  publish:
    name: Publish Release
    needs: [linux, macos, windows, ios, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-asset'
          merge-multiple: true
          path: assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
