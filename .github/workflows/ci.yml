name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [blacksmith-4vcpu-ubuntu-2404, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-glyph
        with:
          install-linux-deps: 'true'

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install sdl2 sdl2_mixer

      - name: Test
        run: |
          CGO_LDFLAGS="${{ runner.os == 'macOS' && '-Wl,-no_warn_duplicate_libraries' || '' }}" \
            go test -count=2 -race -timeout=10m ./gui/...

  coverage:
    name: Coverage
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-glyph
        with:
          install-linux-deps: 'true'

      - name: Test with coverage
        run: go test -count=1 -coverprofile=coverage.out ./gui/...

      - name: Check coverage threshold
        run: |
          go tool cover -func=coverage.out | awk 'END {
            gsub(/%/, "", $3);
            if ($3 + 0 < 70) {
              printf "::error::Coverage %.1f%% below 70%% threshold\n", $3;
              exit 1
            } else {
              printf "Coverage %.1f%% >= 70%% threshold\n", $3
            }
          }'

      - name: Check per-package coverage floors
        run: |
          failures=0
          while IFS='|' read -r pkg floor; do
            pct=$(go tool cover -func=coverage.out | \
              awk -v pkg="$pkg" '
                $1 ~ "^"pkg"/" { stmts += $2; if ($3 > 0) cov += $2 }
                END { if (stmts > 0) printf "%.1f", 100 * cov / stmts;
                      else print "0.0" }')
            if [ -n "$pct" ] && awk "BEGIN { exit ($pct < $floor) ? 0 : 1 }"; then
              echo "::error::$pkg coverage ${pct}% below ${floor}% floor"
              failures=$((failures + 1))
            fi
          done << 'EOF'
          github.com/go-gui-org/go-gui/gui/backend/internal/glyphconv|0
          github.com/go-gui-org/go-gui/gui/backend/internal/imgpath|0
          github.com/go-gui-org/go-gui/gui/backend/internal/sdlkey|0
          github.com/go-gui-org/go-gui/gui/backend/internal/texcache|0
          github.com/go-gui-org/go-gui/gui/backend/internal/imgload|0
          github.com/go-gui-org/go-gui/gui/backend/internal/tempfont|0
          github.com/go-gui-org/go-gui/gui/backend/internal/nativehost|0
          github.com/go-gui-org/go-gui/gui/backend/filedialog|0
          EOF
          if [ "$failures" -gt 0 ]; then
            echo "::error::$failures package(s) below coverage floor"
            exit 1
          fi
          echo "All per-package coverage floors met."

      - name: Save baseline coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: coverage.out
          key: coverage-baseline-${{ github.sha }}

      - name: Restore baseline coverage for diff
        if: github.event_name == 'pull_request'
        id: cov-baseline
        uses: actions/cache/restore@v5
        with:
          path: coverage-baseline.out
          key: coverage-baseline-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            coverage-baseline-

      - name: Coverage diff on PR
        if: github.event_name == 'pull_request'
        run: scripts/cov-diff.sh --github-summary coverage-baseline.out coverage.out

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 30

  vet:
    name: Vet
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Install system dependencies
        run: ./scripts/install-ubuntu-deps.sh

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: Required-ID check
        run: go run ./tools/requiredid/cmd/requiredid ./...

  check:
    name: Check (gate)
    needs: [test, vet]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-glyph
        with:
          install-linux-deps: 'true'
          add-replace: 'false'

      # tidy-check must run BEFORE the go-glyph replace directive is
      # added, otherwise go mod tidy persists the replace into go.mod
      # and prunes go-glyph from go.sum, triggering a spurious diff.
      - name: Run tidy-check (before replace)
        run: make tidy-check

      - name: Add go-glyph replace
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=./go-glyph

      - name: Run gate checks
        run: make vet deps-doc-check large-files generate-check

  examples:
    name: Build examples
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-glyph
        with:
          install-linux-deps: 'true'

      - name: Build examples
        run: make build-examples

  ios:
    name: iOS
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-glyph

      - name: Build c-archive
        working-directory: examples/ios_demo
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CC=$(xcrun --sdk iphoneos --find clang)
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
            CC="$CC" \
            CGO_CFLAGS="-isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
            CGO_LDFLAGS="-isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
            go build -buildmode=c-archive -tags ios -o /dev/null .

      - name: Vet backend
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CGO_ENABLED=1 \
          GOOS=darwin \
          GOARCH=arm64 \
          CC="clang -isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
          go vet -tags ios ./gui/backend/ios/...

  wasm:
    name: WASM
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-glyph

      - name: Build
        run: GOOS=js GOARCH=wasm go build ./...

      - name: Vet
        run: GOOS=js GOARCH=wasm go vet ./...

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Test
        run: |
          NODE_JS="$(find "$(go env GOROOT)" -name wasm_exec_node.js -print -quit)"
          # wasm_exec_node.js copies the entire process environment into a fixed
          # 8KB region of wasm memory; a full CI runner environment overflows it
          # ("total length of command line and environment variables exceeds
          # limit"). Run node with a minimal environment so only argv + a couple
          # of small vars are forwarded to the wasm test binary.
          printf '#!/bin/bash\nexec env -i PATH="%s" HOME="%s" node "%s" "$@"\n' "$PATH" "$HOME" "$NODE_JS" > /tmp/go_js_wasm_exec
          chmod +x /tmp/go_js_wasm_exec
          GOOS=js GOARCH=wasm go test -exec=/tmp/go_js_wasm_exec ./gui/...

  windows:
    name: Windows
    runs-on: blacksmith-4vcpu-windows-2025
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          # Install a fresh MSYS2 tarball. release: false reuses the MSYS2
          # pre-installed at C:\msys64 on GitHub-hosted windows images, which
          # the Blacksmith windows runner does not ship ("MSYS2 installation
          # not found at C:\msys64").
          release: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-fontconfig
            mingw-w64-x86_64-mesa

      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-glyph

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Vet
        run: CGO_ENABLED=1 go vet ./...

      - name: Test (headless)
        run: CGO_ENABLED=1 go test ./gui/...

      - name: Build showcase
        run: |
          CGO_ENABLED=1 go build -tags audio \
            -o build/showcase-windows.exe ./examples/showcase/

      - name: Smoke test showcase
        run: |
          # The runner has no GPU: system opengl32.dll is GDI-generic
          # OpenGL 1.1, but the native backend needs 3.3. Drop Mesa's
          # software opengl32.dll (llvmpipe) next to the exe so the
          # app-dir DLL search resolves it first.
          cp /mingw64/bin/opengl32.dll build/
          export GALLIUM_DRIVER=llvmpipe
          echo "Launching showcase (10s timeout to catch DLL load failures)..."
          ./build/showcase-windows.exe &
          PID=$!
          sleep 10
          if ! kill $PID 2>/dev/null; then
            echo "Process exited before timeout — checking exit code..."
            wait $PID
            echo "Showcase exited with code $? (DLL load failures exit non-zero)"
          else
            echo "Showcase started successfully (no DLL failures)"
          fi

  android:
    name: Android
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-glyph

      - name: Build Android native deps
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          ./go-glyph/scripts/build_android_deps.sh

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          gomobile init

      - name: Build AAR
        working-directory: examples/android_demo
        run: |
          gomobile bind -target=android/arm64 -androidapi 24 \
            -o /tmp/gogui.aar .

      - name: Vet backend
        run: |
          NDK_CC=$(find $ANDROID_NDK_ROOT -name "aarch64-linux-android*-clang" \
            | grep -v clang++ | sort | tail -1)
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 CC=$NDK_CC \
            go vet ./gui/backend/android/...

  benchmark:
    name: Benchmarks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Install system dependencies
        run: ./scripts/install-ubuntu-deps.sh

      - name: Run benchmarks
        run: make bench | tee benchmark-results.txt

      - name: Cache benchmark baseline
        uses: actions/cache/save@v5
        with:
          path: benchmark-results.txt
          key: benchmark-baseline-${{ github.sha }}

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 90

  benchmark-gate:
    name: Benchmark regression gate
    if: github.event_name == 'pull_request'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Install system dependencies
        run: ./scripts/install-ubuntu-deps.sh

      - name: Restore baseline
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: baseline-results.txt
          key: benchmark-baseline-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            benchmark-baseline-

      - name: Run targeted benchmarks
        run: make bench-gate | tee pr-benchmarks.txt

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare benchmarks
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          benchstat -format csv baseline-results.txt pr-benchmarks.txt > benchstat.csv
          echo "## Benchmark comparison" >> $GITHUB_STEP_SUMMARY
          benchstat baseline-results.txt pr-benchmarks.txt >> $GITHUB_STEP_SUMMARY

          # Parse CSV for statistically significant regressions.
          # Columns: name, old, old±, new, new±, delta, p-value, n
          # delta starts with '+' for regressions.
          awk -F',' 'NR>1 {
            gsub(/"/, "", $6);
            if ($6 ~ /^\+/) {
              printf "::warning::%s regressed %s (p=%s)\n", $1, $6, $7
            }
          }' benchstat.csv

      - name: No baseline available
        if: steps.cache.outputs.cache-hit != 'true'
        run: echo "::warning::No benchmark baseline cached from main. Skipping comparison."

  security:
    name: Security scan
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Install system dependencies
        run: ./scripts/install-ubuntu-deps.sh

      - name: Install scanners
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run security scans
        run: make gosec govulncheck
