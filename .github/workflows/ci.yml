name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install \
            pkg-config \
            sdl2 \
            sdl2_mixer \
            freetype \
            harfbuzz \
            pango \
            fontconfig

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Test
        working-directory: go-gui
        run: |
          CGO_LDFLAGS="${{ runner.os == 'macOS' && '-Wl,-no_warn_duplicate_libraries' || '' }}" \
            go test ${{ runner.os == 'Linux' && '-race' || '' }} -coverprofile=coverage.out ./gui/...

      - name: Check coverage threshold
        if: always()
        working-directory: go-gui
        run: |
          go tool cover -func=coverage.out | awk 'END {
            gsub(/%/, "", $3);
            if ($3 + 0 < 70) {
              printf "::error::Coverage %.1f%% below 70%% threshold\n", $3;
              exit 1
            } else {
              printf "Coverage %.1f%% >= 70%% threshold\n", $3
            }
          }'

      - name: Save baseline coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: go-gui/coverage.out
          key: coverage-baseline-${{ matrix.os }}

      - name: Restore baseline coverage for diff
        if: github.event_name == 'pull_request'
        id: cov-baseline
        uses: actions/cache/restore@v4
        with:
          path: go-gui/coverage-baseline.out
          key: coverage-baseline-${{ matrix.os }}

      - name: Coverage diff on PR
        if: github.event_name == 'pull_request'
        working-directory: go-gui
        run: |
          if [ ! -f coverage-baseline.out ]; then
            echo "::warning::No coverage baseline cached from main. Skipping diff."
            exit 0
          fi

          # Write per-package coverage extraction awk script.
          cat > /tmp/pkgcov.awk << 'AWKEOF'
          NR == 1 { next }
          {
              pkg = $1
              idx = match(pkg, /\/[^\/]+$/)
              if (idx > 0) pkg = substr(pkg, 1, idx - 1)
              stmts[pkg] += $2
              if ($3 > 0) covered[pkg] += $2
          }
          END {
              for (p in stmts) {
                  if (stmts[p] == 0) continue
                  pct = 100.0 * covered[p] / stmts[p]
                  printf "%s\t%.1f\n", p, pct
              }
          }
          AWKEOF

          awk -f /tmp/pkgcov.awk coverage-baseline.out | sort > /tmp/baseline-cov.txt
          awk -f /tmp/pkgcov.awk coverage.out | sort > /tmp/pr-cov.txt

          echo "## Coverage diff" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Baseline | PR | Δ |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|----|---|" >> $GITHUB_STEP_SUMMARY

          regressions=0
          join -t $'\t' -a 1 -a 2 -e "-" -o 0,1.2,2.2 \
            /tmp/baseline-cov.txt /tmp/pr-cov.txt |
          while IFS=$'\t' read -r pkg base cur; do
            if [ "$base" = "-" ]; then
              echo "| $pkg | — | ${cur}% | new |" >> $GITHUB_STEP_SUMMARY
            elif [ "$cur" = "-" ]; then
              echo "| $pkg | ${base}% | — | removed |" >> $GITHUB_STEP_SUMMARY
            else
              delta=$(awk "BEGIN { printf \"%.1f\", $cur - $base }")
              if (( $(awk "BEGIN { print ($delta < -2) ? 1 : 0 }") )); then
                echo "::warning::$pkg coverage dropped ${delta}% (${base}% → ${cur}%)"
                regressions=$((regressions + 1))
              fi
              echo "| $pkg | ${base}% | ${cur}% | ${delta}% |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${regressions} package(s) with coverage drop > 2%." >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: go-gui/coverage.out
          retention-days: 30

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7

      - name: Required-ID check
        run: go run ./tools/requiredid/cmd/requiredid ./...

  check:
    name: Check (test + vet + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: make check
        working-directory: go-gui
        run: make check

  examples:
    name: Build examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Build examples
        working-directory: go-gui
        run: make build-examples

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Build c-archive
        working-directory: go-gui/examples/ios_demo
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CC=$(xcrun --sdk iphoneos --find clang)
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
            CC="$CC" \
            CGO_CFLAGS="-isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
            CGO_LDFLAGS="-isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
            go build -buildmode=c-archive -tags ios -o /dev/null .

      - name: Vet backend
        working-directory: go-gui
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CGO_ENABLED=1 \
          GOOS=darwin \
          GOARCH=arm64 \
          CC="clang -isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
          go vet -tags ios ./gui/backend/ios/...

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        working-directory: go-gui
        run: GOOS=js GOARCH=wasm go build ./...

      - name: Vet
        working-directory: go-gui
        run: GOOS=js GOARCH=wasm go vet ./...

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test
        working-directory: go-gui
        run: |
          NODE_JS="$(find "$(go env GOROOT)" -name wasm_exec_node.js -print -quit)"
          printf '#!/bin/bash\nexec node "%s" "$@"\n' "$NODE_JS" > /tmp/go_js_wasm_exec
          chmod +x /tmp/go_js_wasm_exec
          GOOS=js GOARCH=wasm go test -exec=/tmp/go_js_wasm_exec ./gui/...

  windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-fontconfig

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        working-directory: go-gui
        run: CGO_ENABLED=1 go build ./...

      - name: Vet
        working-directory: go-gui
        run: CGO_ENABLED=1 go vet ./...

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: go-gui-org/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/go-gui-org/go-glyph=../go-glyph

      - name: Build Android native deps
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          ./go-glyph/scripts/build_android_deps.sh

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          gomobile init

      - name: Build AAR
        working-directory: go-gui/examples/android_demo
        run: |
          gomobile bind -target=android/arm64 -androidapi 24 \
            -o /tmp/gogui.aar .

      - name: Vet backend
        working-directory: go-gui
        run: |
          NDK_CC=$(find $ANDROID_NDK_ROOT -name "aarch64-linux-android*-clang" \
            | grep -v clang++ | sort | tail -1)
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 CC=$NDK_CC \
            go vet ./gui/backend/android/...

  benchmark:
    name: Benchmarks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=5 -run='^$' -timeout=30m ./gui/... | tee benchmark-results.txt

      - name: Cache benchmark baseline
        uses: actions/cache/save@v4
        with:
          path: benchmark-results.txt
          key: benchmark-baseline

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 90

  benchmark-gate:
    name: Benchmark regression gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Restore baseline
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: baseline-results.txt
          key: benchmark-baseline

      - name: Run targeted benchmarks
        run: |
          FILTER='Benchmark(Layout|GenerateViewLayout|ParseSvg|Tessellate|BuildDefsPathDataCache|RenderLayout|RenderSvg)'
          go test -bench="$FILTER" -benchmem -count=5 -run='^$' -timeout=15m ./gui/... | tee pr-benchmarks.txt

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare benchmarks
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          benchstat -format csv baseline-results.txt pr-benchmarks.txt > benchstat.csv
          echo "## Benchmark comparison" >> $GITHUB_STEP_SUMMARY
          benchstat baseline-results.txt pr-benchmarks.txt >> $GITHUB_STEP_SUMMARY

          # Parse CSV for statistically significant regressions.
          # Columns: name, old, old±, new, new±, delta, p-value, n
          # delta starts with '+' for regressions.
          awk -F',' 'NR>1 {
            gsub(/"/, "", $6);
            if ($6 ~ /^\+/) {
              printf "::warning::%s regressed %s (p=%s)\n", $1, $6, $7
            }
          }' benchstat.csv

      - name: No baseline available
        if: steps.cache.outputs.cache-hit != 'true'
        run: echo "::warning::No benchmark baseline cached from main. Skipping comparison."
