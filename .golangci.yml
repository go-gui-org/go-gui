version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gocyclo
    - modernize
    - unused
    - revive
    - gocritic
    - cyclop
  settings:
    gocyclo:
      min-complexity: 30
    cyclop:
      max-complexity: 50
    gocritic:
      disabled-checks:
        - ifElseChain
    revive:
      rules:
        - name: exported
        - name: if-return
        - name: error-strings
        - name: unexported-return
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocyclo
          - cyclop
      - path: _test\.go
        text: SA5011
      - path: native_platform_noop\.go
        linters:
          - revive
      - path: gui/backend/internal/sdlkey/sdlkey\.go
        linters:
          - cyclop
